user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Basic performance configurations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Hide NGINX version

    # Compression (Gzip)
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    server {
        listen 80 default_server;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # SECURITY HEADERS
        # Prevent Clickjacking
        add_header X-Frame-Options "DENY" always;
        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;
        # Enable XSS filtering in browsers
        add_header X-XSS-Protection "1; mode=block" always;
        # Referrer Policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HTTP Strict Transport Security (HSTS)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        # Content Security Policy (CSP) - Safe CDN domains allowlist
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; object-src 'none';" always;

        # Serve static content
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint for SRE monitoring probes
        location /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'healthy';
        }

        # Caching for Static assets (images, documents, fonts)
        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|webp)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public, max-age=15552000, immutable";
        }

        # Caching for data content modules
        location /content/ {
            expires 1d;
            add_header Cache-Control "public, max-age=86400, must-revalidate";
        }

        # Custom error pages
        error_page 404 /404.html;
        location = /404.html {
            internal;
            return 404 "404 Not Found - SRE Operational Core Endpoint Missing";
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            return 500 "500 Server Error - High Memory or Gateway Timeout Detected";
        }
    }
}
